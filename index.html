<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Catálogo de Produtos</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f0f0f;
    --surface:   #181818;
    --border:    #2a2a2a;
    --border2:   #333;
    --text:      #e8e8e8;
    --muted:     #666;
    --accent:    #c8f542;
    --accent2:   #a8d030;
    --danger:    #ff4d4d;
    --info:      #4db8ff;
    --tag-bg:    #1e1e1e;
    --radius:    6px;
    --mono:      'DM Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; gap: 24px;
    height: 60px;
  }
  .logo {
    font-size: 13px; font-weight: 700; letter-spacing: .15em;
    text-transform: uppercase; color: var(--accent);
    white-space: nowrap;
  }
  .search-wrap {
    flex: 1; max-width: 520px; position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    width: 15px; height: 15px; color: var(--muted); pointer-events: none;
  }
  #searchInput {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-family: var(--mono); font-size: 13px;
    padding: 8px 12px 8px 36px; outline: none;
    transition: border-color .15s;
  }
  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--muted); }

  #countBadge {
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    white-space: nowrap;
  }
  #countBadge span { color: var(--accent); font-weight: 500; }

  /* ── LAYOUT ── */
  .shell { display: flex; height: calc(100vh - 60px); }

  /* ── SIDEBAR ── */
  aside {
    width: 230px; min-width: 230px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto; padding: 16px 0;
    display: flex; flex-direction: column; gap: 0;
  }
  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .filter-group { border-bottom: 1px solid var(--border); padding: 0 0 8px 0; }
  .filter-group:last-child { border-bottom: none; }

  .filter-title {
    font-size: 10px; font-weight: 700; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted);
    padding: 12px 16px 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    user-select: none;
  }
  .filter-title svg { transition: transform .2s; }
  .filter-title.collapsed svg { transform: rotate(-90deg); }

  .filter-options { padding: 0 8px; }
  .filter-options.hidden { display: none; }

  .filter-search {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: var(--mono); font-size: 11px;
    padding: 5px 8px; outline: none; margin-bottom: 4px;
    transition: border-color .15s;
  }
  .filter-search:focus { border-color: var(--accent); }

  .opt-list { max-height: 160px; overflow-y: auto; }
  .opt-list::-webkit-scrollbar { width: 3px; }
  .opt-list::-webkit-scrollbar-thumb { background: var(--border2); }

  .opt-item {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 6px; border-radius: 4px; cursor: pointer;
    font-size: 12px; color: var(--text); user-select: none;
    transition: background .1s;
  }
  .opt-item:hover { background: var(--bg); }
  .opt-item.active { color: var(--accent); }
  .opt-cb {
    width: 13px; height: 13px; border: 1px solid var(--border2);
    border-radius: 3px; flex-shrink: 0; display: flex;
    align-items: center; justify-content: center;
    transition: background .1s, border-color .1s;
  }
  .opt-item.active .opt-cb { background: var(--accent); border-color: var(--accent); }
  .opt-cb svg { width: 9px; height: 9px; color: #000; display: none; }
  .opt-item.active .opt-cb svg { display: block; }
  .opt-label { flex: 1; line-height: 1.3; font-family: var(--mono); }
  .opt-count { font-size: 10px; color: var(--muted); font-family: var(--mono); }

  .clear-btn {
    display: none; margin: 4px 8px 0;
    background: none; border: 1px solid var(--border2);
    border-radius: 4px; color: var(--muted); font-size: 10px;
    padding: 3px 8px; cursor: pointer; font-family: var(--mono);
    transition: color .1s, border-color .1s;
  }
  .clear-btn:hover { color: var(--danger); border-color: var(--danger); }
  .clear-btn.visible { display: block; }

  .clear-all-wrap { padding: 12px 16px 4px; }
  #clearAll {
    background: none; border: 1px solid var(--border2);
    border-radius: var(--radius); color: var(--muted);
    font-size: 11px; font-family: var(--mono); padding: 5px 10px;
    cursor: pointer; width: 100%; transition: all .15s;
  }
  #clearAll:hover { color: var(--danger); border-color: var(--danger); }

  /* ── MAIN TABLE ── */
  main {
    flex: 1; overflow-y: auto; overflow-x: auto;
    padding: 0;
  }
  main::-webkit-scrollbar { width: 6px; height: 6px; }
  main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  table {
    width: 100%; border-collapse: collapse;
    font-size: 12.5px; font-family: var(--mono);
  }
  thead { position: sticky; top: 0; z-index: 10; }
  th {
    background: var(--surface);
    border-bottom: 2px solid var(--border2);
    border-right: 1px solid var(--border);
    padding: 10px 14px;
    text-align: left; white-space: nowrap;
    font-size: 10px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--muted);
    cursor: pointer; user-select: none;
    transition: color .15s;
  }
  th:hover { color: var(--accent); }
  th.sorted { color: var(--accent); }
  th .sort-icon { opacity: .4; font-size: 10px; margin-left: 4px; }
  th.sorted .sort-icon { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;
    cursor: default;
  }
  tbody tr:hover { background: #1c1c1c; }

  td {
    padding: 9px 14px;
    border-right: 1px solid var(--border);
    vertical-align: middle; white-space: nowrap;
    max-width: 260px; overflow: hidden; text-overflow: ellipsis;
  }
  td:last-child { border-right: none; }

  /* COD */
  .td-cod { color: var(--muted); font-size: 11px; }

  /* STATUS badge */
  .badge {
    display: inline-block; padding: 2px 8px;
    border-radius: 3px; font-size: 10px; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase;
  }
  .badge-ativo   { background: #1a2e0a; color: var(--accent); border: 1px solid #3a5a12; }
  .badge-inativo { background: #2a0a0a; color: #ff6b6b; border: 1px solid #5a1212; }
  .badge-default { background: var(--tag-bg); color: var(--muted); border: 1px solid var(--border2); }

  /* Tags (CATÁLOGO, GRUPOCOMPRAS, etc.) */
  .tag {
    display: inline-block; padding: 2px 7px;
    border-radius: 3px; font-size: 10px;
    background: var(--tag-bg); color: #aaa;
    border: 1px solid var(--border2);
  }

  /* EMPTY */
  #emptyMsg {
    display: none; padding: 80px 0;
    text-align: center; color: var(--muted);
    font-size: 14px;
  }
  #emptyMsg strong { color: var(--text); display: block; font-size: 22px; margin-bottom: 8px; }

  /* LOADING */
  #loadingMsg {
    padding: 80px 0; text-align: center;
    color: var(--muted); font-size: 14px;
  }
  .spinner {
    width: 28px; height: 28px; border: 2px solid var(--border2);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .6s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* HIGHLIGHT */
  mark {
    background: rgba(200,245,66,.25);
    color: var(--accent); border-radius: 2px; padding: 0 1px;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    aside { width: 200px; min-width: 200px; }
    td, th { padding: 8px 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">▣ Catálogo</div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="searchInput" type="text" placeholder="Buscar por nome ou variação…" autocomplete="off"/>
  </div>
  <div id="countBadge">— produtos</div>
</header>

<div class="shell">
  <aside id="sidebar"></aside>
  <main>
    <div id="loadingMsg"><div class="spinner"></div>Carregando catálogo…</div>
    <div id="emptyMsg"><strong>0</strong>Nenhum produto encontrado para os filtros selecionados.</div>
    <table id="table" style="display:none">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </main>
</div>

<script>
// ─────────────────────────────────────────────
// CONFIGURAÇÃO
// ─────────────────────────────────────────────
// Aponte para o JSON exportado pelo Apps Script no GitHub Pages:
// Exemplo: 'https://SEU_USUARIO.github.io/catalogo/data/catalogo.json'
// Durante desenvolvimento local, pode usar um caminho relativo: 'data/catalogo.json'
const JSON_URL = 'data/catalogo.json';

const COLUNAS = [
  { key: 'PRODUTO_COD',    label: 'Cód.',        filterable: true  },
  { key: 'PRODUTO_NOME',   label: 'Nome',         filterable: true  },
  { key: 'VARIACAO',       label: 'Variação',     filterable: true  },
  { key: 'STATUS',         label: 'Status',       filterable: true  },
  { key: 'AQUISIÇÃO',      label: 'Aquisição',    filterable: true  },
  { key: 'CATÁLOGO',       label: 'Catálogo',     filterable: true  },
  { key: 'GRUPOCOMPRAS',   label: 'Grupo',        filterable: true  },
  { key: 'TIPOPROD',       label: 'Tipo Prod.',   filterable: true  },
  { key: 'TIPOFISCALPROD', label: 'Tipo Fiscal',  filterable: true  },
];

const SEARCH_COLS = ['PRODUTO_NOME','VARIACAO'];
const FILTERABLE  = COLUNAS.filter(c => c.filterable).map(c => c.key);

// ─────────────────────────────────────────────
let allData    = [];
let filtered   = [];
let sortCol    = null;
let sortAsc    = true;
let activeFilters = {};   // { COL: Set(values) }
let searchTerm = '';

FILTERABLE.forEach(k => activeFilters[k] = new Set());

// ─────────────────────────────────────────────
async function init() {
  try {
    const res  = await fetch(JSON_URL);
    if (!res.ok) throw new Error(res.status);
    allData = await res.json();
  } catch(e) {
    document.getElementById('loadingMsg').innerHTML =
      '⚠️ Não foi possível carregar o JSON.<br><small style="font-size:11px">Verifique o caminho em <code>JSON_URL</code> e a configuração do GitHub Pages.</small>';
    return;
  }
  document.getElementById('loadingMsg').style.display = 'none';
  buildHeader();
  buildSidebar();
  applyAll();
}

// ─────────────────────────────────────────────
function buildHeader() {
  const tr = document.createElement('tr');
  COLUNAS.forEach(col => {
    const th = document.createElement('th');
    th.innerHTML = `${col.label} <span class="sort-icon">↕</span>`;
    th.dataset.key = col.key;
    th.addEventListener('click', () => toggleSort(col.key, th));
    tr.appendChild(th);
  });
  document.getElementById('thead').appendChild(tr);
}

function toggleSort(key, th) {
  if (sortCol === key) { sortAsc = !sortAsc; }
  else { sortCol = key; sortAsc = true; }
  document.querySelectorAll('th').forEach(t => {
    t.classList.remove('sorted');
    t.querySelector('.sort-icon').textContent = '↕';
  });
  th.classList.add('sorted');
  th.querySelector('.sort-icon').textContent = sortAsc ? '↑' : '↓';
  renderTable();
}

// ─────────────────────────────────────────────
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');

  // Botão limpar tudo
  const wrap = document.createElement('div');
  wrap.className = 'clear-all-wrap';
  wrap.innerHTML = '<button id="clearAll">✕ Limpar todos os filtros</button>';
  wrap.querySelector('#clearAll').addEventListener('click', clearAll);
  sidebar.appendChild(wrap);

  FILTERABLE.forEach(key => {
    const col   = COLUNAS.find(c => c.key === key);
    const label = col ? col.label : key;
    const group = document.createElement('div');
    group.className = 'filter-group';
    group.dataset.key = key;

    // título clicável
    const title = document.createElement('div');
    title.className = 'filter-title';
    title.innerHTML = `${label}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12">
        <polyline points="6 9 12 15 18 9"/>
      </svg>`;
    title.addEventListener('click', () => {
      title.classList.toggle('collapsed');
      opts.classList.toggle('hidden');
    });

    const opts = document.createElement('div');
    opts.className = 'filter-options';

    const fsearch = document.createElement('input');
    fsearch.type = 'text';
    fsearch.placeholder = `Filtrar ${label}…`;
    fsearch.className = 'filter-search';
    fsearch.addEventListener('input', () => renderOptList(key));

    const list = document.createElement('div');
    list.className = 'opt-list';
    list.id = `list-${key}`;

    const clearBtn = document.createElement('button');
    clearBtn.className = 'clear-btn';
    clearBtn.id = `clear-${key}`;
    clearBtn.textContent = `✕ Limpar ${label}`;
    clearBtn.addEventListener('click', () => {
      activeFilters[key].clear();
      updateClearBtn(key);
      applyAll();
    });

    opts.appendChild(fsearch);
    opts.appendChild(list);
    opts.appendChild(clearBtn);
    group.appendChild(title);
    group.appendChild(opts);
    group.dataset.fsearch = '';

    // guardar referência ao input de busca
    group.querySelector('.filter-search').addEventListener('input', function() {
      group.dataset.fsearch = this.value.toLowerCase();
      renderOptList(key);
    });

    sidebar.appendChild(group);
  });
}

function getUniqueCounts(key) {
  // conta valores considerando outros filtros ativos (exceto o próprio)
  const others = filtered; // usa o conjunto já filtrado pelos outros critérios
  const map = {};
  others.forEach(row => {
    const v = row[key] || '(vazio)';
    map[v] = (map[v] || 0) + 1;
  });
  return map;
}

function renderOptList(key) {
  const group   = document.querySelector(`.filter-group[data-key="${key}"]`);
  const fsearch = group.dataset.fsearch || '';
  const list    = document.getElementById(`list-${key}`);
  const counts  = {};
  allData.forEach(row => {
    const v = row[key] || '(vazio)';
    counts[v] = (counts[v] || 0) + 1;
  });
  const entries = Object.entries(counts)
    .filter(([v]) => v.toLowerCase().includes(fsearch))
    .sort((a, b) => a[0].localeCompare(b[0], 'pt-BR'));

  list.innerHTML = '';
  entries.forEach(([val, cnt]) => {
    const active = activeFilters[key].has(val);
    const item   = document.createElement('div');
    item.className = 'opt-item' + (active ? ' active' : '');
    item.innerHTML = `
      <div class="opt-cb">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="2 6 5 9 10 3"/>
        </svg>
      </div>
      <span class="opt-label">${val}</span>
      <span class="opt-count">${cnt}</span>`;
    item.addEventListener('click', () => {
      if (activeFilters[key].has(val)) activeFilters[key].delete(val);
      else activeFilters[key].add(val);
      item.classList.toggle('active');
      item.querySelector('.opt-cb').style.background =
        activeFilters[key].has(val) ? 'var(--accent)' : '';
      updateClearBtn(key);
      applyAll();
    });
    list.appendChild(item);
  });
}

function updateClearBtn(key) {
  const btn = document.getElementById(`clear-${key}`);
  if (!btn) return;
  btn.classList.toggle('visible', activeFilters[key].size > 0);
}

// ─────────────────────────────────────────────
function applyAll() {
  const term = searchTerm.toLowerCase().trim();

  filtered = allData.filter(row => {
    // busca textual
    if (term) {
      const hit = SEARCH_COLS.some(k =>
        (row[k] || '').toLowerCase().includes(term));
      if (!hit) return false;
    }
    // filtros sidebar
    for (const key of FILTERABLE) {
      if (activeFilters[key].size === 0) continue;
      const val = row[key] || '(vazio)';
      if (!activeFilters[key].has(val)) return false;
    }
    return true;
  });

  // Re-renderiza listas de opções
  FILTERABLE.forEach(key => renderOptList(key));

  renderTable();
}

// ─────────────────────────────────────────────
function renderTable() {
  const data = [...filtered];

  if (sortCol) {
    data.sort((a, b) => {
      const va = (a[sortCol] || '').toLowerCase();
      const vb = (b[sortCol] || '').toLowerCase();
      return sortAsc ? va.localeCompare(vb, 'pt-BR') : vb.localeCompare(va, 'pt-BR');
    });
  }

  const term  = searchTerm.toLowerCase().trim();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  const table   = document.getElementById('table');
  const emptyEl = document.getElementById('emptyMsg');

  if (data.length === 0) {
    table.style.display   = 'none';
    emptyEl.style.display = 'block';
  } else {
    table.style.display   = '';
    emptyEl.style.display = 'none';

    const frag = document.createDocumentFragment();
    data.forEach(row => {
      const tr = document.createElement('tr');
      COLUNAS.forEach(col => {
        const td  = document.createElement('td');
        let   val = row[col.key] || '';

        if (col.key === 'STATUS') {
          const cl = val.toLowerCase().includes('ativ') && !val.toLowerCase().includes('in')
            ? 'badge-ativo'
            : val.toLowerCase().includes('inat') ? 'badge-inativo' : 'badge-default';
          td.innerHTML = `<span class="badge ${cl}">${val}</span>`;
        } else if (['CATÁLOGO','GRUPOCOMPRAS','TIPOPROD','TIPOFISCALPROD','AQUISIÇÃO'].includes(col.key)) {
          td.innerHTML = val ? `<span class="tag">${highlight(val, term)}</span>` : '';
        } else if (col.key === 'PRODUTO_COD') {
          td.className = 'td-cod';
          td.innerHTML = highlight(val, term);
        } else {
          td.innerHTML = highlight(val, term);
        }
        tr.appendChild(td);
      });
      frag.appendChild(tr);
    });
    tbody.appendChild(frag);
  }

  const badge = document.getElementById('countBadge');
  badge.innerHTML = `<span>${data.length.toLocaleString('pt-BR')}</span> / ${allData.length.toLocaleString('pt-BR')} produtos`;
}

function highlight(text, term) {
  if (!term || !text) return text;
  const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function clearAll() {
  FILTERABLE.forEach(k => { activeFilters[k].clear(); updateClearBtn(k); });
  searchTerm = '';
  document.getElementById('searchInput').value = '';
  applyAll();
}

// ─────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function() {
  searchTerm = this.value;
  applyAll();
});

init();
</script>
</body>
</html>
